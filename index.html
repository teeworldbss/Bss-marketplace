<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BSS BizGroup App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* --- Global Styles --- */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
      color: #333;
    }
    header {
      background: #2c3e50;
      color: #fff;
      padding: 1rem;
      text-align: center;
    }
    nav {
      display: flex;
      justify-content: center;
      background: #34495e;
    }
    nav button {
      background: none;
      border: none;
      color: #fff;
      padding: 1rem;
      cursor: pointer;
      font-size: 1rem;
    }
    nav button:hover {
      background: #2c3e50;
    }
    section {
      display: none;
      padding: 2rem;
    }
    section.active {
      display: block;
    }
    .card {
      background: #fff;
      border-radius: 6px;
      padding: 1rem;
      margin: 1rem 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    form input, form select, form button {
      display: block;
      width: 100%;
      margin: 0.5rem 0;
      padding: 0.5rem;
      font-size: 1rem;
    }
    form button {
      background: #27ae60;
      color: #fff;
      border: none;
      cursor: pointer;
    }
    form button:hover {
      background: #219150;
    }
  </style>
</head>
<body>
  <header>
    <h1>BSS BizGroup</h1>
    <p>Marketplace & Registration Portal</p>
  </header>
  <nav>
    <button onclick="showSection('home')">Home</button>
    <button onclick="showSection('register')">Register</button>
    <button onclick="showSection('login')">Login</button>
    <button onclick="showSection('marketplace')">Marketplace</button>
    <button onclick="showSection('dashboard')">Dashboard</button>
  </nav>

  <!-- Home -->
  <section id="home" class="active">
    <div class="card">
      <h2>Welcome to BSS BizGroup</h2>
      <p>Connect buyers and sellers in one place.</p>
    </div>
  </section>

  <!-- Registration -->
  <section id="register">
    <h2>Register</h2>
    <form onsubmit="registerUser(event)">
      <input id="rName" type="text" placeholder="Full Name" required>
      <input id="rPhone" type="text" placeholder="Phone Number" required>
      <select id="rRole">
        <option value="buyer">Buyer</option>
        <option value="seller">Seller</option>
      </select>
      <button type="submit">Submit</button>
    </form>
  </section>

  <!-- Login -->
  <section id="login">
    <h2>Login</h2>
    <form onsubmit="authenticate(event)">
      <input id="loginUser" type="text" placeholder="Phone Number" required>
      <input id="loginPass" type="password" placeholder="Access Code" required>
      <button type="submit">Login</button>
    </form>
  </section>

  <!-- Marketplace -->
  <section id="marketplace">
    <h2>Marketplace Listings</h2>
    <div id="marketListings"></div>
  </section>

  <!-- Dashboard -->
  <section id="dashboard">
    <h2>Dashboard</h2>
    <div id="dashboardStats"></div>
  </section>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // 🔑 Replace with your Firebase project config
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "bss-bizgroup.firebaseapp.com",
      projectId: "bss-bizgroup",
      storageBucket: "bss-bizgroup.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Navigation
    function showSection(id) {
      document.querySelectorAll("section").forEach(sec => sec.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }

    // Registration
    async function registerUser(e) {
      e.preventDefault();
      await addDoc(collection(db, "bss_registrations"), {
        name: document.getElementById("rName").value,
        phone: document.getElementById("rPhone").value,
        role: document.getElementById("rRole").value,
        status: "pending",
        created_at: new Date()
      });
      alert("✅ Registration saved to Firebase.");
      showSection("home");
    }

    // Login (simple demo)
    async function authenticate(e) {
      e.preventDefault();
      const user = document.getElementById("loginUser").value;
      const pass = document.getElementById("loginPass").value;
      if (user === "08118428191" && pass === "mastercode") {
        alert("🔴 Master Node Access Granted");
        showSection("dashboard");
        loadDashboard();
      } else {
        alert("❌ Invalid credentials");
      }
    }

    // Marketplace
    async function loadMarketplace() {
      const snapshot = await getDocs(collection(db, "marketplace"));
      const listings = snapshot.docs.map(doc => doc.data());
      document.getElementById("marketListings").innerHTML =
        listings.map(item => `<div class="card">📦 ${item.name} — ${item.quantity} units</div>`).join("");
    }

    // Dashboard
    async function loadDashboard() {
      const snapshot = await getDocs(collection(db, "bss_registrations"));
      const users = snapshot.size;
      document.getElementById("dashboardStats").innerHTML =
        `<div class="card">Users: ${users}</div>`;
    }
  </script>
</body>
</html>
