<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BSS Business Group</title>
  <style>
    :root { --wa-dark: #0b141a; --wa-teal: #00a884; --wa-bubble: #202c33; --wa-text: #e9edef; }
    body { background: var(--wa-dark); color: var(--wa-text); font-family: sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
    .header { background: #202c33; padding: 15px; border-bottom: 1px solid #313d45; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 1000; }
    .node-icon { width: 40px; height: 40px; background: var(--wa-teal); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
    .container { padding: 15px; }
    .app-section { display: none; min-height: 80vh; }
    #home { display: block; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
    .card { background: var(--wa-bubble); padding: 25px 10px; border-radius: 12px; text-align: center; border: 1px solid #313d45; cursor: pointer; transition: 0.3s; }
    .card:active { background: #2a3942; transform: scale(0.95); }
    input, select { width: 100%; padding: 16px; margin: 8px 0; border-radius: 10px; border: none; background: #2a3942; color: white; box-sizing: border-box; font-size: 16px; }
    .btn-bss { background: var(--wa-teal); color: #0b141a; border: none; padding: 16px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .msg-received { background: var(--wa-bubble); padding: 15px; border-radius: 0 12px 12px 12px; margin: 10px 0; border-left: 4px solid var(--wa-teal); white-space: pre-wrap; font-size: 14px; line-height: 1.5; }
    .nav { position: fixed; bottom: 0; width: 100%; background: #202c33; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #313d45; z-index: 1000; }
    .nav-item { text-align: center; font-size: 11px; color: #8696a0; flex: 1; cursor: pointer; }
    .nav-item.active { color: var(--wa-teal); }
    .typing { color: var(--wa-teal); font-size: 12px; font-style: italic; margin: 5px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="node-icon">B</div>
    <div><strong>BSS Business Group</strong><br><small>⚪ Guest Mode | Active v1.3.0</small></div>
  </div>

  <div class="container">
    <div id="home" class="app-section">
